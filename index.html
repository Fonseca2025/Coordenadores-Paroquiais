<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenação Paroquial - São Judas Tadeu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --verde-padroeiro: #1B5E20; 
            --verde-claro: #4CAF50;
            --verde-whatsapp: #25D366;
            --azul-ligar: #007AFF;
            --fundo: #F0F4F0;
            --branco: #FFFFFF;
            /* Cores de Categoria */
            --cor-liturgia: #1565C0;
            --cor-catequese: #EF6C00;
            --cor-conselho: #455A64;
            --cor-movimento: #7B1FA2;
            --cor-default: var(--verde-padroeiro);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background-color: var(--fundo); color: #333; }

        header {
            background: linear-gradient(135deg, var(--verde-padroeiro), var(--verde-claro));
            color: white;
            padding: 2.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        main { max-width: 950px; margin: 0 auto; padding: 1rem; }

        /* Card Secretaria */
        .secretaria-card {
            background: white;
            border-left: 10px solid #D32F2F;
            border-radius: 12px;
            padding: 1.5rem;
            margin: -1.5rem auto 2rem auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .search-container { position: sticky; top: 10px; z-index: 1000; margin-bottom: 2rem; }

        #searchInput {
            width: 100%;
            padding: 1.2rem 1.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            outline: none;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Estilos dos Cards com Cores Dinâmicas */
        .card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border-top: 8px solid var(--cor-borda, var(--cor-default));
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .highlight { background-color: #FFF176; font-weight: bold; border-radius: 3px; }

        .tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #eee;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .contact-group {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .tel-text { font-weight: 600; font-size: 0.95rem; color: #444; margin-bottom: 8px; display: block; }

        .action-buttons { display: flex; gap: 8px; }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .btn-whatsapp { background-color: var(--verde-whatsapp); }
        .btn-call { background-color: var(--azul-ligar); }
        .btn-copy { background-color: #546E7A; }
        .btn-copy.success { background-color: #2E7D32; }

        footer { text-align: center; padding: 3rem; color: #666; font-size: 0.85rem; }

        @media (max-width: 600px) {
            .secretaria-card { text-align: center; flex-direction: column; }
            .btn { padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Matriz São Judas Tadeu</h1>
        <p><i class="fas fa-church"></i> Montes Claros - MG</p>
    </header>

    <main>
        <div class="secretaria-card">
            <div>
                <h2 style="color: #D32F2F">Secretaria Paroquial</h2>
                <p>Atendimento Geral e Informações</p>
            </div>
            <div class="action-buttons" style="min-width: 250px;">
                <a href="https://wa.me/5538992410006" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                <a href="tel:+5538992410006" class="btn btn-call"><i class="fas fa-phone"></i></a>
                <button onclick="copyToClipboard('38 99241-0006', this)" class="btn btn-copy"><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar por nome, pastoral ou diretor...">
        </div>

        <div id="results"></div>
    </main>

    <footer>
        <p>Paróquia São Judas Tadeu - Montes Claros/MG</p>
        <p>Desenvolvido para a Pastoral de Conjunto</p>
    </footer>

    <script>
        const pastorais = [
            { organismo: "Pastoral Litúrgica", nome: "Sarah", telefone: "38 99146-7612", diretor: "Pe. Marco Simões" },
            { organismo: "Pastoral da Acolhida", nome: "Ionise", telefone: "38 98807-1653", diretor: "Pe. Marco Simões" },
            { organismo: "Grupo de Leitores", nome: "Alex / Maris", telefone: "38 99192-9243 / 38 99141-9993", diretor: "Pe. Marco Simões" },
            { organismo: "Ministério de Coroinhas", nome: "Nilzete / Kátia", telefone: "38 99122-8414 / 38 99212-1213", diretor: "Pe. Marco Simões" },
            { organismo: "MECEs", nome: "Yata / Suely", telefone: "38 99989-1979 / 38 99210-5556", diretor: "Pe. Marco Simões" },
            { organismo: "PASCOM", nome: "Cris / Claudio", telefone: "38 96828-7007 / 38 99160-0007", diretor: "Pe. Marco Simões" },
            { organismo: "Núcleo Catequético", nome: "Josy", telefone: "38 99890-4207", diretor: "Pe. Mazinho" },
            { organismo: "Catequese da Crisma", nome: "Júnia", telefone: "38 99940-6139", diretor: "Pe. Mazinho" },
            { organismo: "Comunidade São Judas Tadeu (Conselho)", nome: "Raquel", telefone: "38 99908-4728", diretor: "Pe. Marco Simões" }
            // Adicione os demais conforme necessário
        ];

        function getCategoryColor(org) {
            const nome = org.toLowerCase();
            if (nome.includes('liturgia') || nome.includes('leitores') || nome.includes('música') || nome.includes('coroinhas')) return 'var(--cor-liturgia)';
            if (nome.includes('catequese') || nome.includes('crisma') || nome.includes('batismo')) return 'var(--cor-catequese)';
            if (nome.includes('comunidade') || nome.includes('conselho')) return 'var(--cor-conselho)';
            if (nome.includes('eac') || nome.includes('mac') || nome.includes('r.c.c')) return 'var(--cor-movimento)';
            return 'var(--cor-default)';
        }

        function highlight(text, query) {
            if (!query) return text;
            const normalized = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const regex = new RegExp(`(${query})`, "gi");
            return text.replace(regex, `<span class="highlight">$1</span>`);
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.classList.add('success');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.classList.remove('success');
                    btn.innerHTML = originalHtml;
                }, 2000);
            });
        }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('results');
            container.innerHTML = '';

            pastorais.filter(item => {
                const searchArea = `${item.organismo} ${item.nome} ${item.diretor}`.toLowerCase();
                return searchArea.includes(query);
            }).forEach(item => {
                const color = getCategoryColor(item.organismo);
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--cor-borda', color);

                const tels = item.telefone.split(' / ').map(t => {
                    const clean = t.replace(/\D/g, '');
                    return `
                        <div class="contact-group">
                            <span class="tel-text">📱 ${t}</span>
                            <div class="action-buttons">
                                <a href="https://wa.me/55${clean}" target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                                <a href="tel:+55${clean}" class="btn btn-call"><i class="fas fa-phone"></i></a>
                                <button onclick="copyToClipboard('${t}', this)" class="btn btn-copy"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>`;
                }).join('');

                card.innerHTML = `
                    <span class="tag" style="color: ${color}">Paróquia São Judas</span>
                    <h2 style="color: ${color}">${highlight(item.organismo, query)}</h2>
                    <p style="margin: 5px 0"><i class="fas fa-user-circle"></i> <strong>Coord:</strong> ${highlight(item.nome, query)}</p>
                    ${tels}
                    <p style="margin-top: 15px; font-size: 0.8rem; color: #777;">
                        <i class="fas fa-cross"></i> Dir: ${highlight(item.diretor, query)}
                    </p>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', render);
        render();
    </script>
</body>
</html>
