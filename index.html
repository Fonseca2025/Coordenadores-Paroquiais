<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenação Paroquial - São Judas Tadeu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --verde-padroeiro: #1B5E20; 
            --verde-claro: #4CAF50;
            --verde-whatsapp: #25D366;
            --azul-ligar: #007AFF;
            --dourado: #FFC107; 
            --fundo: #F4F9F4;
            --texto-escuro: #333333;
            --branco: #FFFFFF;
            --secretaria: #E8F5E9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--fundo); color: var(--texto-escuro); line-height: 1.5; }

        header {
            background-color: var(--verde-padroeiro);
            color: var(--branco);
            padding: 2rem 1rem;
            text-align: center;
        }

        main { max-width: 900px; margin: 0 auto 2rem auto; padding: 0 1rem; }

        .search-container {
            position: sticky;
            top: 0;
            background-color: var(--fundo);
            padding: 1.5rem 0;
            z-index: 1000;
        }

        #searchInput {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid var(--verde-claro);
            border-radius: 50px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Card da Secretaria - Estilo Diferenciado */
        .secretaria-card {
            background: var(--secretaria);
            border: 2px dashed var(--verde-padroeiro);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .highlight { background-color: #FFF176; color: #000; padding: 0 2px; border-radius: 2px; }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--branco);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-top: 6px solid var(--verde-padroeiro);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-3px); }

        .card h2 { color: var(--verde-padroeiro); font-size: 1.2rem; margin-bottom: 1rem; }

        .contact-group {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn {
            border: none;
            border-radius: 6px;
            color: white;
            padding: 10px;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }
        .btn-whatsapp { background-color: var(--verde-whatsapp); }
        .btn-call { background-color: var(--azul-ligar); }
        .btn-copy { background-color: #607D8B; }

        footer { text-align: center; padding: 2rem; color: #777; font-size: 0.9rem; }

        @media (max-width: 600px) {
            .action-buttons { flex-direction: row; }
            .secretaria-card { text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Matriz São Judas Tadeu</h1>
        <p>Contatos de Pastorais e Movimentos</p>
    </header>

    <main>
        <div class="secretaria-card">
            <div>
                <h2 style="color: var(--verde-padroeiro)">🆘 Dúvidas? Fale com a Secretaria</h2>
                <p>Atendimento Paroquial Geral</p>
            </div>
            <div class="action-buttons" style="flex: 0 1 300px;">
                <a href="https://wa.me/5538992410006" target="_blank" class="btn btn-whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="tel:+5538992410006" class="btn btn-call" title="Ligar"><i class="fas fa-phone"></i></a>
                <button onclick="copyToClipboard('38 99241-0006', this)" class="btn btn-copy" title="Copiar"><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Digite aqui para buscar...">
        </div>

        <div id="results"></div>
    </main>

    <footer>
        <p>Devemos buscar a Pastoral de Conjunto!</p>
    </footer>

    <script>
        const pastorais = [
            { organismo: "Pastoral Litúrgica", nome: "Sarah", telefone: "38 99146-7612", diretor: "Pe. Marco Simões" },
            { organismo: "Pastoral da Acolhida", nome: "Ionise", telefone: "38 98807-1653", diretor: "Pe. Marco Simões" },
            { organismo: "Grupo de Leitores", nome: "Alex / Maris", telefone: "38 99192-9243 / 38 99141-9993", diretor: "Pe. Marco Simões" },
            { organismo: "Ministério de Coroinhas", nome: "Nilzete / Kátia", telefone: "38 99122-8414 / 38 99212-1213", diretor: "Pe. Marco Simões" },
            { organismo: "Ministério de Acólitos", nome: "Edmárcia", telefone: "38 99872-8347", diretor: "Pe. Marco Simões" },
            { organismo: "Ministérios de Música", nome: "Jeanine", telefone: "38 98847-2393", diretor: "Pe. Marco Simões" },
            { organismo: "MECEs", nome: "Yata / Suely", telefone: "38 99989-1979 / 38 99210-5556", diretor: "Pe. Marco Simões" },
            { organismo: "Marcação de Missas", nome: "Edite", telefone: "38 99217-1120", diretor: "Pe. Marco Simões" },
            { organismo: "Ornamentação", nome: "Terezinha", telefone: "38 99188-9211", diretor: "Pe. Marco Simões" },
            { organismo: "Liturgia Mirim", nome: "Sandra", telefone: "38 98866-9139", diretor: "Pe. Marco Simões" },
            { organismo: "PASCOM", nome: "Cris / Claudio", telefone: "38 96828-7007 / 38 99160-0007", diretor: "Pe. Marco Simões" },
            { organismo: "Transmissão", nome: "Ávilo", telefone: "38 99112-6733", diretor: "Pe. Marco Simões" },
            { organismo: "Núcleo Catequético", nome: "Josy", telefone: "38 99890-4207", diretor: "Pe. Mazinho" },
            { organismo: "Catequese da Crisma", nome: "Júnia", telefone: "38 99940-6139", diretor: "Pe. Mazinho" },
            { organismo: "Perseverança", nome: "Sandra", telefone: "38 98866-9139", diretor: "Pe. Mazinho" },
            { organismo: "R.C.C.", nome: "Juliana", telefone: "38 98815-8348", diretor: "Pe. Mazinho" },
            { organismo: "Círculos Bíblicos", nome: "Cleide", telefone: "38 99103-1180", diretor: "Pe. Mazinho" },
            { organismo: "Catequese com Adultos", nome: "Ismael e Zizi", telefone: "38 99953-4278 / 38 99931-4326", diretor: "Pe. Mazinho e Diácono Paulo Antônio" },
            { organismo: "Batismo", nome: "Alex e Raissa", telefone: "38 99889-6867 / 38 99963-2130", diretor: "Pe. Mazinho e Diácono Paulo Antônio" },
            { organismo: "Pastoral Familiar", nome: "Aline e Luciano", telefone: "38 99740-4888 / 38 99997-9403", diretor: "Pe. Marco Simões" },
            { organismo: "Pastoral do Dizimo", nome: "Ruy e Cláudia", telefone: "38 99952-1530 / 38 99999-6910", diretor: "Diácono Paulo Nascimento" },
            { organismo: "Apostolado Oração", nome: "Gelza e Rubens", telefone: "38 98421-9661 / 38 99929-0464", diretor: "Diácono Paulo Nascimento" },
            { organismo: "Mãe Rainha", nome: "Nice", telefone: "38 98409-4660", diretor: "Diácono Alvino" },
            { organismo: "Legião de Maria", nome: "Lucinha", telefone: "38 98858-5926", diretor: "Diácono Alvino" },
            { organismo: "Comunidade São Judas Tadeu (Conselho)", nome: "Raquel", telefone: "38 99908-4728", diretor: "Pe. Marco Simões" }
        ].sort((a, b) => a.organismo.localeCompare(b.organismo));

        function highlightText(text, query) {
            if (!query) return text;
            const re = new RegExp(`(${query.normalize("NFD").replace(/[\u0300-\u036f]/g, "")})`, "gi");
            // Nota: Esta versão simplificada destaca o texto mantendo a lógica de busca sem acento
            return text.replace(re, `<span class="highlight">$1</span>`);
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => btn.innerHTML = originalIcon, 2000);
        }

        function displayResults(query) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';
            
            const normalizedQuery = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

            const filtered = pastorais.filter(item => {
                const searchString = `${item.organismo} ${item.nome} ${item.diretor}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                return searchString.includes(normalizedQuery);
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const telefonesHtml = item.telefone.split(' / ').map(tel => {
                    const numLimpo = tel.replace(/\D/g, '');
                    return `
                        <div class="contact-group">
                            <small>📱 ${tel}</small>
                            <div class="action-buttons">
                                <a href="https://wa.me/55${numLimpo}" target="_blank" rel="noopener" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                                <a href="tel:+55${numLimpo}" class="btn btn-call"><i class="fas fa-phone"></i></a>
                                <button onclick="copyToClipboard('${tel}', this)" class="btn btn-copy"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>`;
                }).join('');

                card.innerHTML = `
                    <h2>${highlightText(item.organismo, query)}</h2>
                    <p><strong>👤 Coord:</strong> ${highlightText(item.nome, query)}</p>
                    ${telefonesHtml}
                    <p style="margin-top:10px; font-size:0.85rem"><strong>⛪ Dir:</strong> ${highlightText(item.diretor, query)}</p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => displayResults(e.target.value));
        displayResults('');
    </script>
</body>
</html>
