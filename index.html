<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenação Paroquial - São Judas Tadeu</title>
    <style>
        /* Paleta de Cores São Judas Tadeu: Verde escuro, Dourado/Amarelo e Branco */
        :root {
            --verde-padroeiro: #1B5E20; /* Verde escuro do manto */
            --verde-claro: #4CAF50;
            --dourado: #FFC107; /* Amarelo/Dourado da medalha */
            --fundo: #F4F9F4;
            --texto-escuro: #333333;
            --branco: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--fundo);
            color: var(--texto-escuro);
        }

        /* Cabeçalho */
        header {
            background-color: var(--verde-padroeiro);
            color: var(--branco);
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--dourado);
            font-weight: 500;
        }

        /* Área Principal */
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Barra de Busca */
        .search-container {
            margin-bottom: 2rem;
            display: flex;
            gap: 10px;
        }

        #searchInput {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            border: 2px solid var(--verde-claro);
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus {
            border-color: var(--verde-padroeiro);
            box-shadow: 0 0 8px rgba(27, 94, 32, 0.3);
        }

        /* Grid de Resultados */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Cartão de Informação */
        .card {
            background: var(--branco);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border-top: 5px solid var(--verde-padroeiro);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: var(--verde-padroeiro);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }

        .card p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .card p strong {
            margin-right: 0.5rem;
            color: #555;
        }

        .icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        /* Mensagem sem resultados */
        .no-results {
            text-align: center;
            color: #777;
            font-size: 1.2rem;
            grid-column: 1 / -1;
            padding: 2rem;
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 2rem;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');

        // Função para renderizar os dados na tela
        function displayResults(query) {
            resultsContainer.innerHTML = ''; // Limpa resultados anteriores
            
            const lowerQuery = query.toLowerCase();
            
            // Filtra o array de pastorais (busca no organismo ou no nome do coordenador)
            const filteredData = pastorais.filter(item => 
                item.organismo.toLowerCase().includes(lowerQuery) || 
                item.nome.toLowerCase().includes(lowerQuery)
            );

            // Mensagem se não encontrar nada
            if (filteredData.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Nenhum resultado encontrado. Tente outra palavra.</div>';
                return;
            }

            // Cria os cartões para os resultados encontrados
            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2>🌿 ${item.organismo}</h2>
                    <p><span class="icon">👤</span> <strong>Coord/Cons.:</strong> ${item.nome}</p>
                    <p><span class="icon">📱</span> <strong>Telefone:</strong> <a href="tel:${item.telefone.split(' / ')[0].replace(/\./g, '').replace(/-/g, '')}" style="color:var(--verde-padroeiro); text-decoration:none;">${item.telefone}</a></p>
                    <p><span class="icon">⛪</span> <strong>Dir. Espiritual:</strong> ${item.diretor}</p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Event Listener para a barra de pesquisa (atualiza enquanto digita)
        searchInput.addEventListener('input', (e) => {
            displayResults(e.target.value);
        });

        // Mostra todos os resultados ao abrir a página
        displayResults('');

</html>
